# GitHub Pages 部署：push main（含管线自动 commit）→ 构建 → 发布。
# 构建后自检产物无密钥痕迹（本项目前端本就不含任何 key，这是兜底防线）。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx vitest run

      - name: Build (base path = /<repo>/)
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      # 前端不应包含任何后端 provider 配置、环境变量名或密钥值。
      - name: Assert no secrets in bundle
        run: |
          if grep -rE "ANTHROPIC_API_KEY|DEEPSEEK_API_KEY|MOONSHOT_API_KEY|ZHIPU_API_KEY|api\.anthropic\.com|api\.deepseek\.com/anthropic|api\.moonshot\.cn/anthropic|open\.bigmodel\.cn/api/anthropic" dist/; then
            echo "::error::构建产物包含网关 provider 配置或环境变量名，中止部署"
            exit 1
          fi
          if grep -rE "sk-ant-[A-Za-z0-9_-]{8,}|sk-[A-Za-z0-9]{24,}" dist/; then
            echo "::error::构建产物疑似包含密钥值，中止部署"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
